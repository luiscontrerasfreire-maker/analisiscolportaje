<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Análisis Colportaje · ACES-DSA · Ministerio de las Publicaciones</title>
<style>
  /* ========== ESTILO 07 DATA-DENSE DASHBOARD ========== */
  :root {
    /* Paleta oficial Estilo 07 */
    --teal-1:    #0F766E;   /* Color de marca */
    --teal-2:    #14B8A6;   /* Segunda serie */
    --teal-3:    #5EEAD4;   /* Tercera serie */
    --orange:    #EA580C;   /* Alerta / inflación */
    --green-pos: #16A34A;   /* Delta positivo */
    --bg:        #F1F5F9;   /* Fondo principal */
    --card:      #FFFFFF;   /* Cards */
    --ink:       #0F172A;   /* Topbar + texto */
    --gray-txt:  #64748B;   /* Etiquetas, ejes */
    --border:    #E2E8F0;   /* Bordes cards/grid */

    /* Paleta extendida para series (derivadas, mantienen el espíritu teal) */
    --c1: #0F766E;
    --c2: #14B8A6;
    --c3: #5EEAD4;
    --c4: #0E7490;
    --c5: #0891B2;
    --c6: #06B6D4;
    --c7: #67E8F9;
    --c8: #EA580C;
    --c9: #F97316;

    --sans: 'Inter', 'Calibri', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'JetBrains Mono', 'Consolas', 'SF Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }
  body { min-height: 100vh; }

  /* TOPBAR */
  .topbar {
    background: var(--ink);
    color: #fff;
    padding: 12px 28px;
    display: flex;
    align-items: center;
    gap: 18px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid #1e293b;
  }
  .topbar-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--teal-1);
    box-shadow: 0 0 0 3px rgba(15,118,110,0.25);
  }
  .topbar-brand {
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .topbar-brand span {
    color: var(--teal-3);
    margin-left: 8px;
    font-weight: 400;
    letter-spacing: 0.06em;
  }
  .topbar-meta {
    margin-left: auto;
    display: flex;
    gap: 16px;
    align-items: center;
    font-family: var(--mono);
    font-size: 11px;
    color: #94a3b8;
  }
  .topbar-status {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--teal-3);
  }
  .topbar-status::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--teal-3);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* HEADER de plataforma */
  .platform-header {
    padding: 22px 28px 18px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  .platform-header h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .platform-header .subtitle {
    font-size: 12px;
    color: var(--gray-txt);
    letter-spacing: 0.02em;
  }
  .platform-header .breadcrumb {
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gray-txt);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .platform-header .breadcrumb span { color: var(--teal-1); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 28px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .tab {
    background: transparent;
    border: none;
    padding: 12px 18px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-txt);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--ink); background: var(--bg); }
  .tab.active {
    color: var(--teal-1);
    border-bottom-color: var(--teal-1);
  }
  .tab .tab-count {
    margin-left: 6px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gray-txt);
    font-weight: 400;
  }

  /* FILTROS */
  .filters {
    padding: 14px 28px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 16px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-label {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 9px;
    color: var(--gray-txt);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .filter-select, .filter-input {
    border: 1px solid var(--border);
    background: var(--card);
    padding: 6px 10px;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--ink);
    border-radius: 4px;
    min-width: 160px;
    cursor: pointer;
  }
  .filter-select:focus, .filter-input:focus {
    outline: 2px solid var(--teal-1);
    outline-offset: -1px;
    border-color: var(--teal-1);
  }
  .filter-seg {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: var(--card);
  }
  .filter-seg button {
    background: transparent;
    border: none;
    padding: 6px 12px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 11px;
    color: var(--gray-txt);
    cursor: pointer;
    border-right: 1px solid var(--border);
  }
  .filter-seg button:last-child { border-right: none; }
  .filter-seg button.active { background: var(--teal-1); color: #fff; }
  .filter-actions {
    margin-left: auto;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn-clear {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--gray-txt);
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    font-weight: 600;
  }
  .btn-clear:hover { color: var(--orange); border-color: var(--orange); }
  .filter-summary {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--gray-txt);
  }
  .filter-summary b { color: var(--teal-1); font-weight: 700; }

  /* MAIN */
  .main {
    padding: 20px 28px 40px;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 14px;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* KPI CARDS */
  .kpi-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    position: relative;
  }
  .kpi-label {
    font-weight: 700;
    font-size: 9px;
    color: var(--gray-txt);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .kpi-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }
  .kpi-value .unit {
    font-size: 12px;
    color: var(--gray-txt);
    font-weight: 400;
    margin-left: 4px;
  }
  .kpi-delta {
    margin-top: 6px;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .kpi-delta.pos { color: var(--green-pos); }
  .kpi-delta.neg { color: var(--orange); }
  .kpi-delta .ctx { color: var(--gray-txt); font-weight: 400; }
  .kpi-sub {
    margin-top: 4px;
    font-size: 10px;
    color: var(--gray-txt);
  }

  /* PANELS */
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 18px;
  }
  .panel-head {
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }
  .panel-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
  }
  .panel-subtitle {
    font-size: 10px;
    color: var(--gray-txt);
    margin-top: 2px;
  }
  .panel-actions {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gray-txt);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Grid spans */
  .s12 { grid-column: span 12; }
  .s8 { grid-column: span 8; }
  .s7 { grid-column: span 7; }
  .s6 { grid-column: span 6; }
  .s5 { grid-column: span 5; }
  .s4 { grid-column: span 4; }
  .s3 { grid-column: span 3; }
  @media (max-width: 1180px) {
    .s8, .s7, .s6, .s5, .s4, .s3 { grid-column: span 12; }
  }

  /* CHIPS */
  .chips-grid {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  .chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover {
    border-color: var(--teal-1);
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(15,23,42,0.06);
  }
  .chip-bar {
    width: 4px;
    align-self: stretch;
    background: var(--teal-1);
    border-radius: 2px;
    flex-shrink: 0;
  }
  .chip-code {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 17px;
    color: var(--ink);
    line-height: 1;
    margin-right: 8px;
    min-width: 38px;
  }
  .chip-content { flex: 1; min-width: 0; }
  .chip-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .chip-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gray-txt);
    margin-top: 3px;
    letter-spacing: 0.04em;
  }
  .chip-value {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 13px;
    color: var(--teal-1);
    font-variant-numeric: tabular-nums;
  }

  /* TABLES */
  .tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
  .tbl thead th {
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
    font-size: 9.5px;
    color: var(--gray-txt);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--bg);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .tbl thead th.num { text-align: right; }
  .tbl thead th .sort-arrow {
    margin-left: 4px;
    color: var(--teal-1);
    font-size: 9px;
  }
  .tbl tbody td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  .tbl tbody td.num { text-align: right; }
  .tbl tbody tr:hover { background: var(--bg); }
  .tbl tbody tr.totalrow td {
    background: var(--bg);
    font-weight: 700;
    border-top: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
  }
  .tbl .titulo-cell {
    font-weight: 600;
    color: var(--ink);
    max-width: 320px;
    white-space: normal;
  }
  .tbl .sehs-cell {
    font-weight: 700;
    color: var(--teal-1);
  }
  .tbl .mute { color: var(--gray-txt); }
  .tbl .num.pos { color: var(--green-pos); font-weight: 600; }
  .tbl .num.neg { color: var(--orange); font-weight: 600; }
  .tbl .num.zero { color: #cbd5e1; }
  .scroll-wrap { max-height: 540px; overflow: auto; }

  /* HEATMAP TABLE */
  .heatmap {
    border-collapse: collapse;
    width: 100%;
    font-size: 11px;
  }
  .heatmap th, .heatmap td {
    padding: 6px 8px;
    text-align: center;
    border: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .heatmap th {
    background: var(--bg);
    font-weight: 700;
    font-size: 9.5px;
    color: var(--gray-txt);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .heatmap th.row-head, .heatmap td.row-head {
    text-align: left;
    font-weight: 700;
    color: var(--ink);
    background: var(--bg);
    text-transform: none;
    letter-spacing: 0;
    min-width: 180px;
    max-width: 280px;
    white-space: normal;
    font-size: 11px;
  }
  .heatmap td.total {
    background: var(--ink) !important;
    color: #fff !important;
    font-weight: 700;
  }
  .heatmap tr.total-row td {
    background: var(--ink) !important;
    color: #fff !important;
    font-weight: 700;
  }
  .heatmap tr.total-row td.row-head {
    background: var(--teal-1) !important;
    color: #fff !important;
  }

  /* SPARKLINE */
  .spark { display: inline-block; vertical-align: middle; }

  /* BAR LIST */
  .barlist { display: flex; flex-direction: column; gap: 7px; }
  .barlist-row {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    align-items: center;
    gap: 10px;
    font-size: 11px;
  }
  .barlist-rank {
    font-family: var(--mono);
    color: var(--gray-txt);
    font-size: 10px;
    text-align: right;
  }
  .barlist-bar-wrap {
    display: flex; flex-direction: column; gap: 3px;
    min-width: 0;
  }
  .barlist-label {
    font-size: 11px;
    color: var(--ink);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .barlist-bar {
    height: 6px;
    background: #f1f5f9;
    border-radius: 3px;
    overflow: hidden;
  }
  .barlist-fill {
    height: 100%;
    background: var(--teal-1);
    border-radius: 3px;
    transition: width 0.3s;
  }
  .barlist-value {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 11px;
    color: var(--ink);
    text-align: right;
    font-variant-numeric: tabular-nums;
    min-width: 70px;
  }

  /* SVG */
  .axis-label { font-family: var(--sans); font-size: 10px; fill: var(--gray-txt); }
  .grid-line { stroke: var(--border); stroke-dasharray: 2 3; }
  .axis-line { stroke: var(--border); stroke-width: 1; }

  /* LEGEND */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 8px;
    justify-content: center;
  }
  .legend-item {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10px;
    color: var(--gray-txt);
  }
  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; }

  /* TOOLTIP */
  .ttip {
    position: fixed;
    pointer-events: none;
    background: var(--ink);
    color: #fff;
    padding: 8px 12px;
    font-size: 11px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.12s;
    z-index: 1000;
    max-width: 280px;
    box-shadow: 0 4px 12px rgba(15,23,42,0.2);
  }
  .ttip .ttl {
    font-weight: 700;
    margin-bottom: 4px;
    font-size: 12px;
    padding-bottom: 4px;
    border-bottom: 1px solid #334155;
  }
  .ttip .row { display: flex; justify-content: space-between; gap: 12px; line-height: 1.5; }
  .ttip .row .lbl { color: #94a3b8; }
  .ttip .row .val { color: #fff; font-weight: 600; font-variant-numeric: tabular-nums; }

  /* TAB CONTENT */
  .tab-pane { display: none; }
  .tab-pane.active { display: contents; }

  /* INSIGHT BOX (acento naranja Estilo 07) */
  .insight {
    background: linear-gradient(135deg, #fff7ed, #ffedd5);
    border: 1px solid #fed7aa;
    border-left: 4px solid var(--orange);
    padding: 14px 18px;
    border-radius: 6px;
    font-size: 12px;
    color: #7c2d12;
    line-height: 1.5;
  }
  .insight b { color: var(--orange); }

  /* SECTION DIVIDER */
  .section-divider {
    grid-column: 1 / -1;
    margin: 8px 0 -2px;
    padding-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--border);
  }
  .section-divider h2 {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .section-divider h2::before {
    content: '■';
    color: var(--teal-1);
    margin-right: 8px;
    font-size: 10px;
  }
  .section-divider .meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gray-txt);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* FOOTER */
  .footer {
    grid-column: 1 / -1;
    padding-top: 16px;
    margin-top: 8px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gray-txt);
    display: flex;
    justify-content: space-between;
    gap: 16px;
  }

  .bar-rect { transition: opacity 0.15s; cursor: pointer; }
  .bar-rect:hover { opacity: 0.78; }

  .loader { padding: 60px; text-align: center; color: var(--gray-txt); font-family: var(--mono); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 40px;
    color: var(--gray-txt);
    font-size: 12px;
  }
  .empty .icon { font-size: 32px; margin-bottom: 8px; opacity: 0.4; }

  /* ============ LOGIN SCREEN ============ */
  .login-screen {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #0F172A 0%, #134e4a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 20px;
  }
  .login-bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(94,234,212,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(94,234,212,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .login-brand {
    position: relative;
    margin-bottom: 32px;
    text-align: center;
    color: #fff;
  }
  .login-brand .dot {
    display: inline-block;
    width: 14px; height: 14px;
    background: var(--teal-2);
    border-radius: 50%;
    box-shadow: 0 0 0 5px rgba(20,184,166,0.25);
    margin-bottom: 16px;
  }
  .login-brand h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: #fff;
    margin-bottom: 6px;
  }
  .login-brand h1 span { color: var(--teal-3); }
  .login-brand .sub {
    font-family: var(--mono);
    font-size: 11px;
    color: #94a3b8;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px 30px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    position: relative;
  }
  .login-card-head {
    border-bottom: 1px solid var(--border);
    padding-bottom: 14px;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .login-card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
  }
  .login-card-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gray-txt);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .login-field {
    margin-bottom: 14px;
  }
  .login-field label {
    display: block;
    font-weight: 700;
    font-size: 9px;
    color: var(--gray-txt);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .login-field input {
    width: 100%;
    border: 1px solid var(--border);
    background: var(--card);
    padding: 9px 12px;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--ink);

<script>
'use strict';

// ============ CONSTANTS ============
const RAW = JSON.parse(document.getElementById('dataset').textContent);
const YEARS = [2021, 2022, 2023, 2024, 2025];
const SEHS_LIST = Array.from(new Set(RAW.map(r => r.SEHS))).sort();
const TITULOS_LIST = Array.from(new Set(RAW.map(r => r.Titulo))).sort();

// ============ AUTHENTICATION ============
const USERS = {
  // Super admin
  'ACES':  { clave: 'aces1897', role: 'super', sehs: null, displayName: 'Administrador ACES-DSA' },
  // SEHS individuales (cada uno ve solo su SEHS)

  'UB':    { clave: '23678', role: 'sehs', sehs: 'SEHS BOLIVIA',     displayName: 'Unión Boliviana' },
  'UCH':   { clave: '43556', role: 'sehs', sehs: 'SEHS CHILE',       displayName: 'Unión Chilena' },
  'UE':    { clave: '22345', role: 'sehs', sehs: 'SEHS ECUADOR',     displayName: 'Unión Ecuatoriana' },

};

let session = null;

function tryLogin(user, clave) {
  const key = String(user || '').trim().toUpperCase();
  const pass = String(clave || '').trim();
  const u = USERS[key];
  if (u && u.clave === pass) {
    session = { user: key, ...u };
    try { sessionStorage.setItem('aces_session', JSON.stringify(session)); } catch(e) {}
    return true;
  }
  return false;
}

function logout() {
  session = null;
  try { sessionStorage.removeItem('aces_session'); } catch(e) {}
  showLogin();
}

function restoreSession() {
  try {
    const raw = sessionStorage.getItem('aces_session');
    if (raw) { session = JSON.parse(raw); return true; }
  } catch(e) {}
  return false;
}

function showLogin() {
  document.getElementById('app').innerHTML = '';
  const screen = document.createElement('div');
  screen.className = 'login-screen';
  screen.innerHTML = `

    <div class="login-brand">

        <div class="login-card-meta">v2.0</div>
      </div>
      <div class="login-error" id="login-error">Usuario o clave incorrectos. Verificá e intentá de nuevo.</div>
      <div class="login-field">
        <label>Usuario</label>

      </div>

        <label>Clave</label>
        <input type="password" id="login-pass" autocomplete="off" placeholder="••••••••" />
      </div>
      <button type="button" class="login-btn" id="login-btn">Ingresar a la plataforma</button>
      <div class="login-foot">
        Acceso restringido · Datos confidenciales<br>
        ACES-DSA · División Sudamericana
      </div>
    </div>
    <div class="login-version">Análisis Colportaje · v2.0 · 2026</div>
  `;
  document.body.appendChild(screen);

  const userInput = document.getElementById('login-user');
  const passInput = document.getElementById('login-pass');
  const btn = document.getElementById('login-btn');
  const errBox = document.getElementById('login-error');

  function attempt() {
    const u = userInput.value;
    const p = passInput.value;
    if (tryLogin(u, p)) {
      screen.remove();
      bootApp();
    } else {
      errBox.classList.add('show');
      passInput.value = '';
      passInput.focus();
    }
  }

  // Click directo en el botón (sin form submit, funciona en sandbox)
  btn.addEventListener('click', attempt);

  // Enter en cualquier input también dispara el login
  function onEnter(e) { if (e.key === 'Enter' || e.keyCode === 13) { e.preventDefault(); attempt(); } }
  userInput.addEventListener('keydown', onEnter);
  passInput.addEventListener('keydown', onEnter);

  // Focus al primer input
  setTimeout(() => userInput.focus(), 50);
}

// Series palette derived from teal family (Estilo 07)
const SERIES = ['#0F766E','#14B8A6','#5EEAD4','#0E7490','#0891B2','#06B6D4','#67E8F9','#EA580C','#F97316','#FB923C','#FED7AA','#0F172A'];

// Color por SEHS (estable, basado en hash de posición)
const SEHS_COLORS = {};
SEHS_LIST.forEach((s, i) => SEHS_COLORS[s] = SERIES[i % SERIES.length]);

// ============ STATE ============
const state = {
  tab: 'overview',
  mode: 'usd',        // 'usd' | 'qty'
  sehs: 'all',
  year: 'all',
  titulo: 'all',
  includeRevistas: true,  // toggle revistas Vida Feliz ($1.12)
  sortKey: null,
  sortDir: 'desc',
};

// Revistas = títulos a precio $1.12 (serie Vida Feliz)
const REVISTAS = new Set(RAW.filter(r => Math.abs(r.PrecioUSD - 1.12) < 0.001).map(r => r.Titulo));
const TOTAL_TITULOS = TITULOS_LIST.length;
const TOTAL_TITULOS_SIN_REV = TITULOS_LIST.filter(t => !REVISTAS.has(t)).length;
function catalogSize() { return state.includeRevistas ? TOTAL_TITULOS : TOTAL_TITULOS_SIN_REV; }

// ============ FORMATTERS ============
function fmtUSD(n) {
  if (n == null || isNaN(n)) return '—';
  const sign = n < 0 ? '−' : '';
  return sign + '$' + Math.abs(n).toLocaleString('en-US', {maximumFractionDigits: 0});
}
function fmtUSDshort(n) {
  if (n == null || isNaN(n)) return '—';
  const abs = Math.abs(n), sign = n < 0 ? '−' : '';
  if (abs >= 1e6) return sign + '$' + (abs/1e6).toFixed(2) + 'M';
  if (abs >= 1e3) return sign + '$' + (abs/1e3).toFixed(1) + 'K';
  return sign + '$' + abs.toFixed(0);
}
function fmtQty(n) { if (n == null || isNaN(n)) return '—'; return n.toLocaleString('en-US'); }
function fmtQtyShort(n) {
  if (n == null || isNaN(n)) return '—';
  const abs = Math.abs(n), sign = n < 0 ? '−' : '';
  if (abs >= 1e6) return sign + (abs/1e6).toFixed(2) + 'M';
  if (abs >= 1e3) return sign + (abs/1e3).toFixed(0) + 'K';
  return sign + abs;
}
function fmtPct(n) { if (isNaN(n) || !isFinite(n)) return '—'; return (n >= 0 ? '+' : '') + n.toFixed(1) + '%'; }
function fmtS(n) { return state.mode === 'usd' ? fmtUSDshort(n) : fmtQtyShort(n); }
function fmtV(n) { return state.mode === 'usd' ? fmtUSD(n) : fmtQty(n); }
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============ DATA HELPERS ============
function getFiltered() {
  return RAW.filter(r =>
    (state.sehs === 'all' || r.SEHS === state.sehs) &&
    (state.year === 'all' || r.Anio === Number(state.year)) &&
    (state.titulo === 'all' || r.Titulo === state.titulo) &&
    (state.includeRevistas || !REVISTAS.has(r.Titulo))
  );
}
function metric(r) { return state.mode === 'usd' ? (r.IngresoUSD || 0) : (r.Cantidad || 0); }

function aggregate(data) {
  const usdSum = data.reduce((s, r) => s + (r.IngresoUSD || 0), 0);
  const qtySum = data.reduce((s, r) => s + (r.Cantidad || 0), 0);
  const invoices = new Set(data.map(r => r.Factura)).size;
  const titlesSet = new Set(data.map(r => r.Titulo));
  const sehsSet = new Set(data.map(r => r.SEHS));

  // Por año
  const byYear = {};
  YEARS.forEach(y => byYear[y] = {anio: y, usd: 0, qty: 0, tx: 0, s1_usd: 0, s2_usd: 0, s1_qty: 0, s2_qty: 0});
  data.forEach(r => {
    const o = byYear[r.Anio];
    if (!o) return;
    o.usd += r.IngresoUSD || 0;
    o.qty += r.Cantidad || 0;
    o.tx += 1;
    const sk = r.Semestre === '1S' ? 's1' : 's2';
    o[sk + '_usd'] += r.IngresoUSD || 0;
    o[sk + '_qty'] += r.Cantidad || 0;
  });
  let cumU = 0, cumQ = 0;
  const annual = YEARS.map(y => {
    const o = byYear[y];
    cumU += o.usd; cumQ += o.qty;
    return { ...o, cum_usd: cumU, cum_qty: cumQ };
  });

  // Por SEHS
  const bySehs = {};
  SEHS_LIST.forEach(s => {
    bySehs[s] = { sehs: s, usd: 0, qty: 0, tx: 0, titulos: new Set() };
    YEARS.forEach(y => { bySehs[s]['usd_'+y] = 0; bySehs[s]['qty_'+y] = 0; });
  });
  data.forEach(r => {
    const o = bySehs[r.SEHS];
    if (!o) return;
    o.usd += r.IngresoUSD || 0;
    o.qty += r.Cantidad || 0;
    o.tx += 1;
    o.titulos.add(r.Titulo);
    o['usd_'+r.Anio] += r.IngresoUSD || 0;
    o['qty_'+r.Anio] += r.Cantidad || 0;
  });
  const sehsArr = Object.values(bySehs)
    .filter(s => s.usd > 0 || s.qty > 0)
    .map(s => ({ ...s, titulosCount: s.titulos.size, value: state.mode==='usd'?s.usd:s.qty }))
    .sort((a, b) => b.value - a.value);

  // Por título
  const byTitulo = {};
  data.forEach(r => {
    if (!byTitulo[r.Titulo]) {
      byTitulo[r.Titulo] = {
        titulo: r.Titulo, codigo: r.Codigo, precio: r.PrecioUSD,
        usd: 0, qty: 0, tx: 0,
        sehs: new Set(), years: new Set(),
      };
      YEARS.forEach(y => { byTitulo[r.Titulo]['usd_'+y] = 0; byTitulo[r.Titulo]['qty_'+y] = 0; });
    }
    const o = byTitulo[r.Titulo];
    o.usd += r.IngresoUSD || 0;
    o.qty += r.Cantidad || 0;
    o.tx += 1;
    o.sehs.add(r.SEHS);
    o.years.add(r.Anio);
    o['usd_'+r.Anio] += r.IngresoUSD || 0;
    o['qty_'+r.Anio] += r.Cantidad || 0;
  });
  const tituloArr = Object.values(byTitulo).map(t => ({
    ...t,
    sehsCount: t.sehs.size,
    yearsCount: t.years.size,
    value: state.mode==='usd'?t.usd:t.qty,
  })).sort((a, b) => b.value - a.value);

  // YoY (global del corte actual)
  const v25 = annual[4][state.mode==='usd'?'usd':'qty'];
  const v24 = annual[3][state.mode==='usd'?'usd':'qty'];
  const yoy = v24 > 0 ? ((v25 - v24) / v24) * 100 : (v25 > 0 ? Infinity : 0);

  // Tasa de Crecimiento Anual Compuesto (CAGR) 2021-2025
  const v21 = annual[0][state.mode==='usd'?'usd':'qty'];
  let cagr = NaN;
  if (v21 > 0 && v25 > 0) cagr = (Math.pow(v25/v21, 1/4) - 1) * 100;

  // Mejor año, mejor SEHS, mejor título
  const bestYear = annual.slice().sort((a,b)=> (state.mode==='usd'?b.usd-a.usd:b.qty-a.qty))[0];
  const bestSehs = sehsArr[0];
  const bestTitulo = tituloArr[0];

  return {
    usdSum, qtySum, invoices,
    titlesCount: titlesSet.size,
    sehsCount: sehsSet.size,
    txCount: data.length,
    avgTicket: invoices > 0 ? usdSum / invoices : 0,
    yoy, cagr,
    annual, sehsArr, tituloArr,
    bestYear, bestSehs, bestTitulo,
  };
}

// ============ DOM helpers ============
function el(tag, attrs, kids) {
  const svgTags = ['svg','g','rect','path','line','circle','text','polyline','polygon','defs','linearGradient','stop','clipPath','tspan'];
  const n = svgTags.includes(tag)
    ? document.createElementNS('http://www.w3.org/2000/svg', tag)
    : document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(k => {
    if (k === 'class') n.setAttribute('class', attrs[k]);
    else if (k === 'html') n.innerHTML = attrs[k];
    else if (k === 'text') n.textContent = attrs[k];
    else if (k.startsWith('on') && typeof attrs[k] === 'function') n.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (attrs[k] != null) n.setAttribute(k, attrs[k]);
  });
  if (kids) (Array.isArray(kids) ? kids : [kids]).forEach(c => {
    if (c == null) return;
    if (typeof c === 'string' || typeof c === 'number') n.appendChild(document.createTextNode(c));
    else n.appendChild(c);
  });
  return n;
}

function niceTicks(max, count = 5) {
  if (max <= 0) return [0, 1];
  const rough = max / count;
  const mag = Math.pow(10, Math.floor(Math.log10(rough)));
  const norm = rough / mag;
  let step;
  if (norm < 1.5) step = 1 * mag;
  else if (norm < 3) step = 2 * mag;
  else if (norm < 7) step = 5 * mag;
  else step = 10 * mag;
  const ticks = [];
  for (let v = 0; v <= max * 1.02; v += step) ticks.push(v);
  if (ticks[ticks.length - 1] < max) ticks.push(ticks[ticks.length - 1] + step);
  return ticks;
}

// ============ TOOLTIP ============
const ttip = document.getElementById('ttip');
function showTip(x, y, title, rows) {
  let h = `<div class="ttl">${escapeHtml(title)}</div>`;
  rows.forEach(([k, v]) => {
    h += `<div class="row"><span class="lbl">${escapeHtml(k)}</span><span class="val">${escapeHtml(v)}</span></div>`;
  });
  ttip.innerHTML = h;
  ttip.style.opacity = '1';
  positionTip(x, y);
}
function positionTip(x, y) {
  const r = ttip.getBoundingClientRect();
  let nx = x + 14, ny = y + 14;
  if (nx + r.width > window.innerWidth - 8) nx = x - r.width - 14;
  if (ny + r.height > window.innerHeight - 8) ny = y - r.height - 14;
  ttip.style.left = nx + 'px';
  ttip.style.top = ny + 'px';
}
function hideTip() { ttip.style.opacity = '0'; }

// ============ SVG CHART: ANNUAL EVOLUTION ============
function renderAnnualChart(container, annual, height = 280) {
  container.innerHTML = '';
  const W = container.clientWidth || 700, H = height;
  const m = { top: 14, right: 60, bottom: 36, left: 60 };
  const iw = W - m.left - m.right, ih = H - m.top - m.bottom;
  const isUSD = state.mode === 'usd';
  const s1k = isUSD ? 's1_usd' : 's1_qty';
  const s2k = isUSD ? 's2_usd' : 's2_qty';
  const ck = isUSD ? 'cum_usd' : 'cum_qty';

  const totals = annual.map(d => d[s1k] + d[s2k]);
  const maxBar = Math.max(...totals, 1);
  const maxCum = Math.max(...annual.map(d => d[ck]), 1);
  const ticksL = niceTicks(maxBar);
  const ticksR = niceTicks(maxCum);
  const yMaxL = ticksL[ticksL.length-1];
  const yMaxR = ticksR[ticksR.length-1];
  const xStep = iw / annual.length;
  const barW = xStep * 0.5;

  const svg = el('svg', { width: W, height: H, viewBox: `0 0 ${W} ${H}` });
  const g = el('g', { transform: `translate(${m.left},${m.top})` });

  ticksL.forEach(t => {
    const y = ih - (t / yMaxL) * ih;
    g.appendChild(el('line', { x1: 0, y1: y, x2: iw, y2: y, class: 'grid-line' }));
    g.appendChild(el('text', { x: -6, y: y + 3, 'text-anchor': 'end', class: 'axis-label', text: fmtS(t) }));
  });
  ticksR.forEach(t => {
    const y = ih - (t / yMaxR) * ih;
    g.appendChild(el('text', { x: iw + 6, y: y + 3, 'text-anchor': 'start', class: 'axis-label', fill: '#EA580C', text: fmtS(t) }));
  });
  g.appendChild(el('line', { x1: 0, y1: ih, x2: iw, y2: ih, class: 'axis-line' }));

  annual.forEach((d, i) => {
    const cx = i * xStep + xStep / 2;
    const bx = cx - barW / 2;
    const s1 = d[s1k], s2 = d[s2k];
    const total = s1 + s2;
    const h1 = (s1 / yMaxL) * ih;
    const h2 = (s2 / yMaxL) * ih;

    g.appendChild(el('rect', {
      x: bx, y: ih - h1 - h2, width: barW, height: h2,
      fill: '#14B8A6', class: 'bar-rect', rx: 1,
      onmouseenter: (e) => showTip(e.clientX, e.clientY, d.anio + ' · 2do Semestre', [
        [state.mode === 'usd' ? 'Ingresos' : 'Ejemplares', fmtV(s2)],
      ]),
      onmousemove: (e) => positionTip(e.clientX, e.clientY),
      onmouseleave: hideTip,
    }));
    g.appendChild(el('rect', {
      x: bx, y: ih - h1, width: barW, height: h1,
      fill: '#0F766E', class: 'bar-rect', rx: 1,
      onmouseenter: (e) => showTip(e.clientX, e.clientY, d.anio + ' · 1er Semestre', [
        [state.mode === 'usd' ? 'Ingresos' : 'Ejemplares', fmtV(s1)],
      ]),
      onmousemove: (e) => positionTip(e.clientX, e.clientY),
      onmouseleave: hideTip,
    }));

    g.appendChild(el('text', {
      x: cx, y: ih - h1 - h2 - 5, 'text-anchor': 'middle',
      class: 'axis-label', fill: '#0F172A', 'font-weight': 700, 'font-size': 10,
      text: fmtS(total),
    }));
    g.appendChild(el('text', {
      x: cx, y: ih + 18, 'text-anchor': 'middle',
      class: 'axis-label', 'font-size': 11, fill: '#0F172A', 'font-weight': 700,
      text: d.anio,
    }));
  });

  const linePts = annual.map((d, i) => [i * xStep + xStep / 2, ih - (d[ck] / yMaxR) * ih]);
  g.appendChild(el('polyline', {
    points: linePts.map(p => p.join(',')).join(' '),
    fill: 'none', stroke: '#EA580C', 'stroke-width': 2.2,
  }));
  linePts.forEach((p, i) => {
    g.appendChild(el('circle', {
      cx: p[0], cy: p[1], r: 4, fill: '#EA580C', stroke: '#fff', 'stroke-width': 2,
      class: 'bar-rect',
      onmouseenter: (e) => showTip(e.clientX, e.clientY, annual[i].anio + ' · Acumulado', [
        ['Total acumulado', fmtV(annual[i][ck])],
      ]),
      onmousemove: (e) => positionTip(e.clientX, e.clientY),
      onmouseleave: hideTip,
    }));
  });

  svg.appendChild(g);
  container.appendChild(svg);

  const lg = document.createElement('div');
  lg.className = 'legend';
  lg.innerHTML =
    '<span class="legend-item"><span class="legend-swatch" style="background:#0F766E"></span>1er Semestre</span>' +
    '<span class="legend-item"><span class="legend-swatch" style="background:#14B8A6"></span>2do Semestre</span>' +
    '<span class="legend-item"><span class="legend-swatch" style="background:#EA580C;border-radius:50%"></span>Acumulado histórico</span>';
  container.appendChild(lg);
}

// ============ SVG CHART: HORIZONTAL BARS (Ranking) ============
function renderRanking(container, items, opts = {}) {
  container.innerHTML = '';
  const labelFn = opts.labelFn || (d => d.label);
  const valueFn = opts.valueFn || (d => d.value);
  const colorFn = opts.colorFn || ((d,i) => SERIES[i % SERIES.length]);
  const max = Math.max(...items.map(valueFn), 1);
  const total = items.reduce((s, it) => s + valueFn(it), 0);

  const wrap = document.createElement('div');
  wrap.className = 'barlist';
  items.forEach((it, i) => {
    const v = valueFn(it);
    const pct = (v / max) * 100;
    const share = total > 0 ? (v / total * 100).toFixed(1) : '0.0';
    const label = labelFn(it);
    const shown = label.length > 36 ? label.slice(0, 34) + '…' : label;
    const row = document.createElement('div');
    row.className = 'barlist-row';
    row.title = label + ' · ' + share + '% del total';
    row.innerHTML = `
      <span class="barlist-rank">#${String(i+1).padStart(2,'0')}</span>
      <div class="barlist-bar-wrap">
        <span class="barlist-label">${escapeHtml(shown)}</span>
        <div class="barlist-bar"><div class="barlist-fill" style="width:${pct}%;background:${colorFn(it, i)}"></div></div>
      </div>
      <span class="barlist-value">${fmtS(v)}<br><span style="font-weight:400;color:var(--gray-txt);font-size:9.5px">${share}%</span></span>
    `;
    wrap.appendChild(row);
  });
  container.appendChild(wrap);
}

// ============ SVG CHART: STACKED BARS BY YEAR ============
function renderStacked(container, categoryRows, categoryKey, valueKeys, valueLabels, colors, height = 320) {
  container.innerHTML = '';
  const W = container.clientWidth || 600, H = height;
  const m = { top: 14, right: 14, bottom: 36, left: 60 };
  const iw = W - m.left - m.right, ih = H - m.top - m.bottom;

  // valueKeys are dimension keys; for stacked by year, we pass YEARS as valueKeys
  const totals = categoryRows.map(r => valueKeys.reduce((s, k) => s + (r[k] || 0), 0));
  const maxY = Math.max(...totals, 1);
  const ticks = niceTicks(maxY);
  const yMax = ticks[ticks.length-1];
  const xStep = iw / categoryRows.length;
  const barW = xStep * 0.6;

  const svg = el('svg', { width: W, height: H, viewBox: `0 0 ${W} ${H}` });
  const g = el('g', { transform: `translate(${m.left},${m.top})` });
  ticks.forEach(t => {
    const y = ih - (t / yMax) * ih;
    g.appendChild(el('line', { x1: 0, y1: y, x2: iw, y2: y, class: 'grid-line' }));
    g.appendChild(el('text', { x: -6, y: y + 3, 'text-anchor': 'end', class: 'axis-label', text: fmtS(t) }));
  });
  g.appendChild(el('line', { x1: 0, y1: ih, x2: iw, y2: ih, class: 'axis-line' }));

  categoryRows.forEach((row, i) => {
    const cx = i * xStep + xStep / 2;
    const bx = cx - barW / 2;
    let cumY = 0;
    valueKeys.forEach((k, j) => {
      const v = row[k] || 0;
      if (v <= 0) return;
      const h = (v / yMax) * ih;
      g.appendChild(el('rect', {
        x: bx, y: ih - cumY - h, width: barW, height: h,
        fill: colors[j], class: 'bar-rect', stroke: '#fff', 'stroke-width': 0.5,
        onmouseenter: (e) => showTip(e.clientX, e.clientY, row[categoryKey] + ' · ' + valueLabels[j], [
          [state.mode === 'usd' ? 'Ingresos' : 'Ejemplares', fmtV(v)],
          ['% del total', ((v/totals[i])*100).toFixed(1) + '%'],
        ]),
        onmousemove: (e) => positionTip(e.clientX, e.clientY),
        onmouseleave: hideTip,
      }));
      cumY += h;
    });
    g.appendChild(el('text', {
      x: cx, y: ih - cumY - 5, 'text-anchor': 'middle',
      class: 'axis-label', fill: '#0F172A', 'font-weight': 700, 'font-size': 10,
      text: fmtS(totals[i]),
    }));
    const lbl = String(row[categoryKey]);
    const lblShort = lbl.length > 14 ? lbl.slice(0, 12) + '…' : lbl;
    g.appendChild(el('text', {
      x: cx, y: ih + 18, 'text-anchor': 'middle',
      class: 'axis-label', 'font-size': 10, fill: '#0F172A', 'font-weight': 600,
      text: lblShort,
    }));
  });

  svg.appendChild(g);
  container.appendChild(svg);

  const lg = document.createElement('div');
  lg.className = 'legend';
  lg.innerHTML = valueLabels.map((l, i) =>
    `<span class="legend-item"><span class="legend-swatch" style="background:${colors[i]}"></span>${escapeHtml(l)}</span>`
  ).join('');
  container.appendChild(lg);
}

// ============ SPARKLINE ============
function sparkline(values, w, h, opts) {
  opts = opts || {};
  w = w || 60; h = h || 18;
  if (!values.length) return '';
  const max = Math.max(...values, 1);
  const min = 0;
  const range = max - min || 1;
  const step = values.length > 1 ? w / (values.length - 1) : 0;
  const pts = values.map((v, i) => [i * step, h - ((v - min) / range) * (h - 3) - 1.5]);
  const d = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const last = pts[pts.length-1];
  return `<svg class="spark" width="${w}" height="${h}">` +
    `<path d="${d}" fill="none" stroke="${opts.color || '#0F766E'}" stroke-width="1.5"/>` +
    `<circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.5" fill="${opts.color || '#0F766E'}"/>` +
    `</svg>`;
}

// ============ DONUT CHART ============
function renderDonut(container, items, opts = {}) {
  container.innerHTML = '';
  const labelFn = opts.labelFn || (d => d.label);
  const valueFn = opts.valueFn || (d => d.value);
  const colors = opts.colors || SERIES;
  const size = opts.size || 220;
  const cx = size/2, cy = size/2, r = size/2 - 8, ir = size/2 - 38;
  const total = items.reduce((s, it) => s + valueFn(it), 0);

  const svg = el('svg', { width: size, height: size, viewBox: `0 0 ${size} ${size}` });
  let cur = -Math.PI/2;
  items.forEach((it, i) => {
    const v = valueFn(it);
    if (v <= 0) return;
    const frac = v / total;
    const ang = frac * Math.PI * 2;
    const x1 = cx + Math.cos(cur) * r, y1 = cy + Math.sin(cur) * r;
    const x2 = cx + Math.cos(cur + ang) * r, y2 = cy + Math.sin(cur + ang) * r;
    const x3 = cx + Math.cos(cur + ang) * ir, y3 = cy + Math.sin(cur + ang) * ir;
    const x4 = cx + Math.cos(cur) * ir, y4 = cy + Math.sin(cur) * ir;
    const large = ang > Math.PI ? 1 : 0;
    const d = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${ir} ${ir} 0 ${large} 0 ${x4} ${y4} Z`;
    const color = colors[i % colors.length];
    const label = labelFn(it);
    svg.appendChild(el('path', {
      d, fill: color, class: 'bar-rect', stroke: '#fff', 'stroke-width': 1.5,
      onmouseenter: (e) => showTip(e.clientX, e.clientY, label, [
        [state.mode === 'usd' ? 'Ingresos' : 'Ejemplares', fmtV(v)],
        ['Participación', (frac*100).toFixed(1) + '%'],
      ]),
      onmousemove: (e) => positionTip(e.clientX, e.clientY),
      onmouseleave: hideTip,
    }));
    cur += ang;
  });
  // Center text
  svg.appendChild(el('text', {
    x: cx, y: cy - 4, 'text-anchor': 'middle',
    'font-family': 'var(--sans)', 'font-size': 9, fill: '#64748B',
    'font-weight': 700, 'letter-spacing': '0.08em',
    text: 'TOTAL',
  }));
  svg.appendChild(el('text', {
    x: cx, y: cy + 14, 'text-anchor': 'middle',
    'font-family': 'var(--sans)', 'font-size': 17, fill: '#0F172A',
    'font-weight': 700,
    text: fmtS(total),
  }));
  container.appendChild(svg);
}

// ============ HEATMAP TABLE (entidad/título × año) ============
function renderHeatmap(container, rows, rowKey, rowLabel, colorRGB) {
  container.innerHTML = '';
  colorRGB = colorRGB || '15, 118, 110';
  const sumPerYear = {};
  YEARS.forEach(y => sumPerYear[y] = rows.reduce((s, r) => s + (r[y] || 0), 0));
  const grandTotal = rows.reduce((s, r) => s + (r.total || 0), 0);

  const tbl = document.createElement('table');
  tbl.className = 'heatmap';

  let h = `<thead><tr><th class="row-head">${escapeHtml(rowLabel)}</th>`;
  YEARS.forEach(y => h += `<th>${y}</th>`);
  h += `<th style="border-left:2px solid var(--ink)">Total</th><th>%</th><th>Tendencia</th></tr></thead><tbody>`;

  rows.forEach(row => {
    const maxRow = Math.max(...YEARS.map(y => row[y] || 0), 1);
    const pctTotal = grandTotal > 0 ? (row.total / grandTotal) * 100 : 0;
    const vals = YEARS.map(y => row[y] || 0);
    h += `<tr><td class="row-head">${escapeHtml(row[rowKey])}</td>`;
    YEARS.forEach(y => {
      const v = row[y] || 0;
      const intensity = maxRow > 0 ? v / maxRow : 0;
      const bg = `rgba(${colorRGB}, ${(intensity * 0.78).toFixed(2)})`;
      const fg = intensity > 0.5 ? '#fff' : '#0F172A';
      const fw = intensity > 0.4 ? 700 : 400;
      h += `<td style="background:${bg};color:${fg};font-weight:${fw}">${v > 0 ? fmtS(v) : '—'}</td>`;
    });
    h += `<td class="total">${fmtS(row.total)}</td>`;
    h += `<td><b>${pctTotal.toFixed(1)}%</b></td>`;
    h += `<td>${sparkline(vals)}</td></tr>`;
  });
  // Total row
  h += `<tr class="total-row"><td class="row-head">TOTAL</td>`;
  YEARS.forEach(y => h += `<td>${fmtS(sumPerYear[y])}</td>`);
  h += `<td>${fmtS(grandTotal)}</td><td>100.0%</td><td>${sparkline(YEARS.map(y => sumPerYear[y]), 60, 18, {color:'#fff'})}</td></tr>`;
  h += `</tbody>`;
  tbl.innerHTML = h;
  container.appendChild(tbl);
}

function renderOverview(root, agg) {
  const yoyCls = isFinite(agg.yoy) && agg.yoy < 0 ? 'neg' : 'pos';
  const yoyArrow = isFinite(agg.yoy) ? (agg.yoy >= 0 ? '▲' : '▼') : '';
  const cagrCls = !isNaN(agg.cagr) && agg.cagr < 0 ? 'neg' : 'pos';
  const cagrArrow = !isNaN(agg.cagr) ? (agg.cagr >= 0 ? '▲' : '▼') : '';

  root.innerHTML = `
    <!-- KPI ROW -->
    <div class="kpi-card s3">
      <div class="kpi-label">Ingresos USD</div>
      <div class="kpi-value">${fmtUSDshort(agg.usdSum)}</div>
      <div class="kpi-delta ${yoyCls}">${yoyArrow} ${isFinite(agg.yoy) ? fmtPct(agg.yoy) : '—'} <span class="ctx">vs 2024</span></div>
      <div class="kpi-sub">${fmtUSD(agg.usdSum)}</div>
    </div>
    <div class="kpi-card s3">
      <div class="kpi-label">Ejemplares</div>
      <div class="kpi-value">${fmtQtyShort(agg.qtySum)}</div>
      <div class="kpi-delta ${cagrCls}">${cagrArrow} ${!isNaN(agg.cagr) ? fmtPct(agg.cagr) : '—'} <span class="ctx">CAGR 21-25</span></div>
      <div class="kpi-sub">${fmtQty(agg.qtySum)} unidades</div>
    </div>
    <div class="kpi-card s3">
      <div class="kpi-label">Ticket promedio</div>
      <div class="kpi-value">${fmtUSDshort(agg.avgTicket)}</div>
      <div class="kpi-delta"><span class="ctx">${agg.invoices.toLocaleString()} facturas emitidas</span></div>
      <div class="kpi-sub">${(agg.qtySum/agg.invoices).toFixed(0)} ejemplares/factura prom.</div>
    </div>
    <div class="kpi-card s3">
      <div class="kpi-label">Cobertura</div>
      <div class="kpi-value">${agg.sehsCount}<span class="unit">SEHS</span> · ${agg.titlesCount}<span class="unit">tít</span></div>
      <div class="kpi-delta"><span class="ctx">${agg.txCount.toLocaleString()} líneas de venta</span></div>
      <div class="kpi-sub">${state.year==='all' ? '5 años de historia' : 'Año ' + state.year}</div>
    </div>

    <div class="section-divider"><h2>Evolución plurianual</h2><div class="meta">Serie temporal 2021—2025</div></div>

    <section class="panel s8">
      <div class="panel-head">
        <div>
          <div class="panel-title">Evolución por semestre + acumulado histórico</div>
          <div class="panel-subtitle">Barras = ${state.mode==='usd'?'facturación USD':'unidades vendidas'} por semestre · Línea naranja = acumulado en eje derecho</div>
        </div>
        <div class="panel-actions">CHART_01</div>
      </div>
      <div id="chart-annual"></div>
    </section>

    <section class="panel s4">
      <div class="panel-head">
        <div>
          <div class="panel-title">Participación por SEHS</div>
          <div class="panel-subtitle">Distribución del total</div>
        </div>
        <div class="panel-actions">DONUT_01</div>
      </div>
      <div id="donut-sehs" style="display:flex;justify-content:center;align-items:center;height:240px"></div>
      <div id="donut-legend" style="font-size:10.5px;line-height:1.7;color:var(--gray-txt);max-height:120px;overflow-y:auto"></div>
    </section>

    <div class="section-divider"><h2>Top performers</h2><div class="meta">${state.mode==='usd'?'Por facturación':'Por unidades'}</div></div>

    <section class="panel s6">
      <div class="panel-head">
        <div>
          <div class="panel-title">Ranking SEHS</div>
          <div class="panel-subtitle">Volumen consolidado · ${state.mode==='usd'?'USD':'ejemplares'}</div>
        </div>
        <div class="panel-actions">${agg.sehsArr.length} entidades</div>
      </div>
      <div id="rank-sehs"></div>
    </section>

    <section class="panel s6">
      <div class="panel-head">
        <div>
          <div class="panel-title">Ranking Títulos</div>
          <div class="panel-subtitle">Top 10 · ${state.mode==='usd'?'USD':'ejemplares'}</div>
        </div>
        <div class="panel-actions">${agg.tituloArr.length} títulos activos</div>
      </div>
      <div id="rank-titulos"></div>
    </section>

    <div class="section-divider"><h2>Chips por título</h2><div class="meta">Vista compacta · click para filtrar</div></div>
    <div class="chips-grid" id="chips"></div>
  `;

  renderAnnualChart(document.getElementById('chart-annual'), agg.annual, 280);

  // Donut: SEHS
  renderDonut(document.getElementById('donut-sehs'),
    agg.sehsArr.map(s => ({label: s.sehs, value: s.value})));
  // Donut legend
  const total = agg.sehsArr.reduce((s, x) => s + x.value, 0);
  document.getElementById('donut-legend').innerHTML = agg.sehsArr.map((s, i) =>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:2px 0">
      <span><span style="display:inline-block;width:8px;height:8px;background:${SERIES[i % SERIES.length]};border-radius:2px;margin-right:6px"></span>${escapeHtml(s.sehs)}</span>
      <b style="color:var(--ink);font-family:var(--mono);font-size:10px">${(s.value/total*100).toFixed(1)}%</b>
    </div>`
  ).join('');

  // Rank SEHS
  renderRanking(document.getElementById('rank-sehs'),
    agg.sehsArr.map(s => ({label: s.sehs, value: s.value})),
    { colorFn: (it) => SEHS_COLORS[it.label] || SERIES[0] });

  // Rank Títulos top 10
  renderRanking(document.getElementById('rank-titulos'),
    agg.tituloArr.slice(0, 10).map(t => ({label: t.titulo, value: t.value})));

  // Chips por título
  const chipsContainer = document.getElementById('chips');
  agg.tituloArr.forEach((t, i) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.title = `Click para filtrar a "${t.titulo}"`;
    chip.innerHTML = `
      <div class="chip-bar" style="background:${SERIES[i % SERIES.length]}"></div>
      <div class="chip-code">${String(i+1).padStart(2,'0')}</div>
      <div class="chip-content">
        <div class="chip-label">${escapeHtml(t.titulo)}</div>
        <div class="chip-meta">$${(t.precio||0).toFixed(2)} · ${t.sehsCount}/8 SEHS · ${t.yearsCount}/5 años</div>
      </div>
      <div class="chip-value">${fmtS(t.value)}</div>
    `;
    chip.addEventListener('click', () => { state.titulo = t.titulo; state.tab = 'titulos'; render(); });
    chipsContainer.appendChild(chip);
  });
}

// ============ TAB: SEHS ============

  // Si hay SEHS específica, mostrar detalle
  const isSpecific = state.sehs !== 'all';
  const sehsSelected = isSpecific ? agg.sehsArr.find(s => s.sehs === state.sehs) : null;

  root.innerHTML = `
    <div class="section-divider"><h2>${isSpecific ? 'Detalle: ' + escapeHtml(state.sehs) : 'Análisis por SEHS'}</h2><div class="meta">${agg.sehsArr.length} entidades activas</div></div>

    ${isSpecific && sehsSelected ? `
      <div class="kpi-card s3">
        <div class="kpi-label">Ingresos USD</div>
        <div class="kpi-value">${fmtUSDshort(sehsSelected.usd)}</div>
        <div class="kpi-sub">${fmtUSD(sehsSelected.usd)}</div>
      </div>
      <div class="kpi-card s3">
        <div class="kpi-label">Ejemplares</div>
        <div class="kpi-value">${fmtQtyShort(sehsSelected.qty)}</div>
        <div class="kpi-sub">${fmtQty(sehsSelected.qty)} unidades</div>
      </div>
      <div class="kpi-card s3">
        <div class="kpi-label">Catálogo</div>
        <div class="kpi-value">${sehsSelected.titulosCount}<span class="unit">títulos</span></div>
        <div class="kpi-sub">de ${catalogSize()} disponibles</div>
      </div>
      <div class="kpi-card s3">
        <div class="kpi-label">Transacciones</div>
        <div class="kpi-value">${sehsSelected.tx}</div>
        <div class="kpi-sub">líneas de venta</div>
      </div>
    ` : ''}

    <section class="panel s8">
      <div class="panel-head">
        <div>
          <div class="panel-title">${isSpecific ? 'Evolución ' + escapeHtml(state.sehs) : 'Evolución por SEHS'} × año</div>
          <div class="panel-subtitle">Barras apiladas · ${state.mode==='usd'?'USD':'ejemplares'}</div>
        </div>
        <div class="panel-actions">CHART_SEHS</div>
      </div>
      <div id="chart-sehs-stack"></div>
    </section>

    <section class="panel s4">
      <div class="panel-head">
        <div>
          <div class="panel-title">Ranking SEHS</div>
          <div class="panel-subtitle">${state.mode==='usd'?'USD acumulado':'Ejemplares acumulados'}</div>
        </div>
      </div>
      <div id="rank-sehs"></div>
    </section>

    <section class="panel s12">
      <div class="panel-head">
        <div>
          <div class="panel-title">Tabla completa por SEHS</div>
          <div class="panel-subtitle">Click en encabezado para ordenar</div>
        </div>
        <div class="panel-actions">${agg.sehsArr.length} filas</div>
      </div>
      <div style="overflow-x:auto">
        <table class="tbl" id="tbl-sehs">
          <thead><tr>
            <th>#</th>
            <th>SEHS</th>
            ${YEARS.map(y => `<th class="num">${y}</th>`).join('')}
            <th class="num">Total ${state.mode==='usd'?'USD':'Ejempl.'}</th>
            <th class="num">% del total</th>
            <th class="num">Títulos</th>
            <th class="num">Transac.</th>
            <th class="num">Tendencia</th>
          </tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  `;

  // Stacked: SEHS rows, years as stack
  const stackRows = agg.sehsArr.map(s => {
    const o = { sehs: s.sehs };
    YEARS.forEach(y => o[y] = state.mode==='usd' ? s['usd_'+y] : s['qty_'+y]);
    return o;
  });
  renderStacked(document.getElementById('chart-sehs-stack'), stackRows, 'sehs',
    YEARS, YEARS.map(String), SERIES.slice(0, 5), 340);

  renderRanking(document.getElementById('rank-sehs'),
    agg.sehsArr.map(s => ({label: s.sehs, value: s.value})),
    { colorFn: it => SEHS_COLORS[it.label] || SERIES[0] });

  // Table
  const totalAll = agg.sehsArr.reduce((s, x) => s + (state.mode==='usd'?x.usd:x.qty), 0);
  const tbody = document.querySelector('#tbl-sehs tbody');
  let html = '';
  agg.sehsArr.forEach((s, i) => {
    const vals = YEARS.map(y => state.mode==='usd' ? s['usd_'+y] : s['qty_'+y]);
    const total = state.mode==='usd' ? s.usd : s.qty;
    const pct = totalAll > 0 ? (total/totalAll*100) : 0;
    html += `<tr>
      <td class="mute">${String(i+1).padStart(2,'0')}</td>
      <td class="sehs-cell">${escapeHtml(s.sehs)}</td>
      ${vals.map(v => `<td class="num ${v===0?'zero':''}">${v > 0 ? fmtS(v) : '—'}</td>`).join('')}
      <td class="num"><b>${fmtS(total)}</b></td>
      <td class="num">${pct.toFixed(1)}%</td>
      <td class="num mute">${s.titulosCount}</td>
      <td class="num mute">${s.tx}</td>
      <td class="num">${sparkline(vals)}</td>
    </tr>`;
  });
  const yearTotals = YEARS.map(y => agg.sehsArr.reduce((sum, s) => sum + (state.mode==='usd'?s['usd_'+y]:s['qty_'+y]), 0));
  html += `<tr class="totalrow">
    <td></td><td>TOTAL</td>
    ${yearTotals.map(v => `<td class="num">${fmtS(v)}</td>`).join('')}
    <td class="num">${fmtS(totalAll)}</td>
    <td class="num">100.0%</td>
    <td class="num">—</td><td class="num">${agg.txCount}</td>
    <td class="num">${sparkline(yearTotals)}</td>
  </tr>`;
  tbody.innerHTML = html;
}

// ============ TAB: YEARS ============
function renderYears(root, agg) {
  const isSpecific = state.year !== 'all';

  root.innerHTML = `
    <div class="section-divider"><h2>${isSpecific ? 'Año ' + state.year : 'Análisis por Año'}</h2><div class="meta">Comparativos anuales</div></div>

    ${YEARS.map((y, i) => {
      const yo = agg.annual[i];
      const total = state.mode==='usd' ? yo.usd : yo.qty;
      const prev = i > 0 ? (state.mode==='usd' ? agg.annual[i-1].usd : agg.annual[i-1].qty) : 0;
      const yoy = prev > 0 ? ((total - prev)/prev*100) : null;
      const cls = yoy == null ? '' : (yoy >= 0 ? 'pos' : 'neg');
      const arrow = yoy == null ? '' : (yoy >= 0 ? '▲' : '▼');
      return `
        <div class="kpi-card s4" style="grid-column: span ${i < 3 ? 4 : 6}">
          <div class="kpi-label">${y}</div>
          <div class="kpi-value">${fmtS(total)}</div>
          <div class="kpi-delta ${cls}">${arrow} ${yoy != null ? fmtPct(yoy) : '—'} <span class="ctx">${i === 0 ? '(año base)' : 'vs ' + (y-1)}</span></div>
          <div class="kpi-sub">${yo.tx} transacciones · ${fmtUSDshort(yo.usd)} · ${fmtQtyShort(yo.qty)} ej.</div>
        </div>
      `;
    }).join('')}

    <section class="panel s12">
      <div class="panel-head">
        <div>
          <div class="panel-title">Evolución anual completa</div>
          <div class="panel-subtitle">Barras por semestre + línea acumulado</div>
        </div>
      </div>
      <div id="chart-annual"></div>
    </section>

    <section class="panel s6">
      <div class="panel-head">
        <div>
          <div class="panel-title">Composición anual por SEHS</div>
          <div class="panel-subtitle">${state.mode==='usd'?'USD':'ejemplares'} apilados</div>
        </div>
      </div>
      <div id="chart-year-sehs"></div>
    </section>

    <section class="panel s6">
      <div class="panel-head">
        <div>
          <div class="panel-title">Composición anual por Título</div>
          <div class="panel-subtitle">Top 10 + otros · ${state.mode==='usd'?'USD':'ejemplares'}</div>
        </div>
      </div>
      <div id="chart-year-tit"></div>
    </section>
  `;

  renderAnnualChart(document.getElementById('chart-annual'), agg.annual, 320);

  // Stacked: año × SEHS
  const yearRows = YEARS.map(y => {
    const o = { anio: y };
    agg.sehsArr.forEach(s => o[s.sehs] = state.mode==='usd' ? s['usd_'+y] : s['qty_'+y]);
    return o;
  });
  const sehsKeys = agg.sehsArr.map(s => s.sehs);
  const sehsColors = sehsKeys.map(s => SEHS_COLORS[s]);
  renderStacked(document.getElementById('chart-year-sehs'), yearRows, 'anio',
    sehsKeys, sehsKeys, sehsColors, 340);

  // Stacked: año × top 10 títulos
  const top10 = agg.tituloArr.slice(0, 10);
  const yearRowsT = YEARS.map(y => {
    const o = { anio: y };
    top10.forEach(t => o[t.titulo] = state.mode==='usd' ? t['usd_'+y] : t['qty_'+y]);
    // Otros
    const otros = agg.tituloArr.slice(10).reduce((s, t) => s + (state.mode==='usd' ? t['usd_'+y] : t['qty_'+y]), 0);
    o['_otros_'] = otros;
    return o;
  });
  const tKeys = top10.map(t => t.titulo).concat(['_otros_']);
  const tLabels = top10.map(t => t.titulo.length > 24 ? t.titulo.slice(0, 22) + '…' : t.titulo).concat(['Otros']);
  const tColors = SERIES.slice(0, 10).concat(['#cbd5e1']);
  renderStacked(document.getElementById('chart-year-tit'), yearRowsT, 'anio',
    tKeys, tLabels, tColors, 340);
}

function renderMatrix(root, agg) {
  root.innerHTML = `
    <div class="section-divider"><h2>Matriz cruzada SEHS × Año</h2><div class="meta">Heatmap de intensidad</div></div>

          <div class="panel-subtitle">Cuanto más oscuro, mayor valor relativo dentro de la fila</div>
        </div>
        <div class="panel-actions">HEATMAP_SEHS</div>
      </div>
      <div style="overflow-x:auto"><div id="heat-sehs"></div></div>
    </section>

    <div class="section-divider"><h2>Matriz cruzada Título × Año</h2><div class="meta">24 títulos del catálogo</div></div>
    <section class="panel s12">
      <div class="panel-head">
        <div>
          <div class="panel-title">Título × Año</div>
          <div class="panel-subtitle">Detección de tendencias temporales · sparkline por título</div>
        </div>
        <div class="panel-actions">HEATMAP_TITULOS</div>
      </div>
      <div style="overflow-x:auto"><div id="heat-tit"></div></div>
    </section>

    <div class="section-divider"><h2>Matriz cruzada Título × SEHS</h2><div class="meta">Dónde se vende cada título</div></div>
    <section class="panel s12">
      <div class="panel-head">
        <div>
          <div class="panel-title">Título × SEHS</div>
          <div class="panel-subtitle">Mapa de cobertura geográfica del catálogo</div>
        </div>
        <div class="panel-actions">HEATMAP_TIT_SEHS</div>
      </div>
      <div style="overflow-x:auto"><div id="heat-tit-sehs"></div></div>
    </section>
  `;

  // Heat SEHS × Año
  const sehsRows = agg.sehsArr.map(s => {
    const o = { sehs: s.sehs };
    YEARS.forEach(y => o[y] = state.mode==='usd' ? s['usd_'+y] : s['qty_'+y]);
    o.total = state.mode==='usd' ? s.usd : s.qty;
    return o;
  });
  renderHeatmap(document.getElementById('heat-sehs'), sehsRows, 'sehs', 'SEHS', '15, 118, 110');

  // Heat Título × Año
  const titRows = agg.tituloArr.map(t => {
    const o = { titulo: t.titulo };
    YEARS.forEach(y => o[y] = state.mode==='usd' ? t['usd_'+y] : t['qty_'+y]);
    o.total = state.mode==='usd' ? t.usd : t.qty;
    return o;
  });
  renderHeatmap(document.getElementById('heat-tit'), titRows, 'titulo', 'Título', '234, 88, 12');

  // Heat Título × SEHS
  const titSehsContainer = document.getElementById('heat-tit-sehs');
  const sehsList = agg.sehsArr.map(s => s.sehs);
  // Build aggregation
  const matrix = {};
  agg.tituloArr.forEach(t => { matrix[t.titulo] = {}; sehsList.forEach(s => matrix[t.titulo][s] = 0); });
  getFiltered().forEach(r => {
    if (matrix[r.Titulo] && matrix[r.Titulo][r.SEHS] !== undefined) {
      matrix[r.Titulo][r.SEHS] += metric(r);
    }
  });
  let h = `<table class="heatmap"><thead><tr><th class="row-head">Título</th>${sehsList.map(s => `<th>${escapeHtml(s.replace('SEHS ',''))}</th>`).join('')}<th style="border-left:2px solid var(--ink)">Total</th></tr></thead><tbody>`;
  agg.tituloArr.forEach(t => {
    const rowVals = sehsList.map(s => matrix[t.titulo][s] || 0);
    const rowTotal = rowVals.reduce((a,b)=>a+b, 0);
    const maxRow = Math.max(...rowVals, 1);
    h += `<tr><td class="row-head">${escapeHtml(t.titulo)}</td>`;
    rowVals.forEach(v => {
      const intensity = maxRow > 0 ? v / maxRow : 0;
      const bg = `rgba(15, 118, 110, ${(intensity * 0.78).toFixed(2)})`;
      const fg = intensity > 0.5 ? '#fff' : '#0F172A';
      const fw = intensity > 0.4 ? 700 : 400;
      h += `<td style="background:${bg};color:${fg};font-weight:${fw}">${v > 0 ? fmtS(v) : '—'}</td>`;
    });
    h += `<td class="total">${fmtS(rowTotal)}</td></tr>`;
  });
  // total row
  const colTotals = sehsList.map(s => agg.tituloArr.reduce((sum, t) => sum + (matrix[t.titulo][s] || 0), 0));
  const grand = colTotals.reduce((a,b)=>a+b, 0);
  h += `<tr class="total-row"><td class="row-head">TOTAL</td>${colTotals.map(v => `<td>${fmtS(v)}</td>`).join('')}<td>${fmtS(grand)}</td></tr>`;
  h += `</tbody></table>`;
  titSehsContainer.innerHTML = h;
}

// ============ TAB: RANKINGS ============
function renderRankings(root, agg) {
  root.innerHTML = `
    <div class="section-divider"><h2>Rankings globales</h2><div class="meta">Top performers en todas las dimensiones</div></div>

    <section class="panel s4">
      <div class="panel-head"><div><div class="panel-title">Top 5 SEHS</div><div class="panel-subtitle">por ${state.mode==='usd'?'USD':'ejemplares'}</div></div></div>
      <div id="rank-sehs"></div>
    </section>
    <section class="panel s4">
      <div class="panel-head"><div><div class="panel-title">Top 10 Títulos</div><div class="panel-subtitle">Bestsellers globales</div></div></div>
      <div id="rank-tit"></div>
    </section>
    <section class="panel s4">
      <div class="panel-head"><div><div class="panel-title">Top 5 Años</div><div class="panel-subtitle">Mejor año por volumen</div></div></div>
      <div id="rank-year"></div>
    </section>

    <div class="section-divider"><h2>Ranking de crecimiento (CAGR 2021-2025)</h2><div class="meta">Solo títulos con datos en 2021 y 2025</div></div>
    <section class="panel s12">
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr>
            <th>#</th>
            <th>Título</th>
            <th class="num">2021</th>
            <th class="num">2025</th>
            <th class="num">CAGR 4 años</th>
            <th class="num">Δ Absoluto</th>
            <th class="num">Tendencia</th>
          </tr></thead>
          <tbody id="tbl-growth"></tbody>
        </table>
      </div>
    </section>

    <div class="section-divider"><h2>Títulos emergentes (sin ventas en 2021, con ventas en 2024-2025)</h2><div class="meta">Productos nuevos del catálogo</div></div>
    <section class="panel s12">
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr>
            <th>#</th>
            <th>Título</th>
            <th class="num">2021</th>
            <th class="num">2022</th>
            <th class="num">2023</th>
            <th class="num">2024</th>
            <th class="num">2025</th>
            <th class="num">Total ${state.mode==='usd'?'USD':'Ej.'}</th>
            <th class="num">SEHS</th>
          </tr></thead>
          <tbody id="tbl-emerging"></tbody>
        </table>
      </div>
    </section>
  `;

  renderRanking(document.getElementById('rank-sehs'),
    agg.sehsArr.slice(0, 5).map(s => ({label: s.sehs, value: s.value})),
    { colorFn: it => SEHS_COLORS[it.label] || SERIES[0] });
  renderRanking(document.getElementById('rank-tit'),
    agg.tituloArr.slice(0, 10).map(t => ({label: t.titulo, value: t.value})));

  // Ranking de años
  const yearRanking = agg.annual
    .map(y => ({label: String(y.anio), value: state.mode==='usd' ? y.usd : y.qty, anio: y.anio}))
    .sort((a, b) => b.value - a.value);
  renderRanking(document.getElementById('rank-year'), yearRanking,
    { colorFn: (_, i) => SERIES[i % SERIES.length] });

  // CAGR table (solo con valores en 2021 y 2025)
  const growth = agg.tituloArr.map(t => {
    const v21 = state.mode==='usd' ? t['usd_2021'] : t['qty_2021'];
    const v25 = state.mode==='usd' ? t['usd_2025'] : t['qty_2025'];
    let cagr = null;
    if (v21 > 0 && v25 > 0) cagr = (Math.pow(v25/v21, 1/4) - 1) * 100;
    return {
      titulo: t.titulo,
      v21, v25,
      cagr,
      delta: v25 - v21,
      vals: YEARS.map(y => state.mode==='usd' ? t['usd_'+y] : t['qty_'+y])
    };
  }).filter(g => g.v21 > 0 && g.v25 > 0).sort((a,b) => b.cagr - a.cagr);

  const tbG = document.getElementById('tbl-growth');
  let hG = '';
  growth.forEach((g, i) => {
    const cls = g.cagr >= 0 ? 'pos' : 'neg';
    const arrow = g.cagr >= 0 ? '▲' : '▼';
    const dcls = g.delta >= 0 ? 'pos' : 'neg';
    hG += `<tr>
      <td class="mute">${String(i+1).padStart(2,'0')}</td>
      <td class="titulo-cell">${escapeHtml(g.titulo)}</td>
      <td class="num">${fmtS(g.v21)}</td>
      <td class="num">${fmtS(g.v25)}</td>
      <td class="num ${cls}">${arrow} ${fmtPct(g.cagr)}</td>
      <td class="num ${dcls}">${g.delta >= 0 ? '+' : ''}${fmtS(g.delta)}</td>
      <td class="num">${sparkline(g.vals)}</td>
    </tr>`;
  });
  if (growth.length === 0) hG = `<tr><td colspan="7" class="empty">Sin datos suficientes para calcular CAGR</td></tr>`;
  tbG.innerHTML = hG;

  // Emerging
  const emerging = agg.tituloArr.filter(t => {
    const v21 = state.mode==='usd' ? t['usd_2021'] : t['qty_2021'];
    const v24 = state.mode==='usd' ? t['usd_2024'] : t['qty_2024'];
    const v25 = state.mode==='usd' ? t['usd_2025'] : t['qty_2025'];
    return v21 === 0 && (v24 > 0 || v25 > 0);
  }).sort((a,b) => (state.mode==='usd'?b.usd-a.usd:b.qty-a.qty));

  const tbE = document.getElementById('tbl-emerging');
  let hE = '';
  emerging.forEach((t, i) => {
    const vals = YEARS.map(y => state.mode==='usd' ? t['usd_'+y] : t['qty_'+y]);
    hE += `<tr>
      <td class="mute">${String(i+1).padStart(2,'0')}</td>
      <td class="titulo-cell">${escapeHtml(t.titulo)}</td>
      ${vals.map(v => `<td class="num ${v===0?'zero':''}">${v > 0 ? fmtS(v) : '—'}</td>`).join('')}
      <td class="num"><b>${fmtS(state.mode==='usd'?t.usd:t.qty)}</b></td>
      <td class="num mute">${t.sehsCount}/8</td>
    </tr>`;
  });
  if (emerging.length === 0) hE = `<tr><td colspan="9" class="empty">No hay títulos emergentes en el corte actual</td></tr>`;
  tbE.innerHTML = hE;
}

// ============ TAB: INSIGHTS ============
function renderInsights(root, agg) {
  // Compute key insights
  const best = agg.bestSehs;
  const bestT = agg.bestTitulo;
  const bestY = agg.bestYear;
  const top3Sehs = agg.sehsArr.slice(0, 3);
  const top3SehsValue = top3Sehs.reduce((s, x) => s + x.value, 0);
  const top3Share = agg.usdSum > 0 ? (top3SehsValue / (state.mode==='usd'?agg.usdSum:agg.qtySum) * 100) : 0;
  const top3Tit = agg.tituloArr.slice(0, 3);
  const top3TitShare = (top3Tit.reduce((s, x) => s + x.value, 0)) / (state.mode==='usd'?agg.usdSum:agg.qtySum) * 100;

  // Worst YoY 2024-2025 títulos
  const yoyTitulos = agg.tituloArr.map(t => {
    const v24 = state.mode==='usd' ? t['usd_2024'] : t['qty_2024'];
    const v25 = state.mode==='usd' ? t['usd_2025'] : t['qty_2025'];
    const yoy = v24 > 0 ? ((v25-v24)/v24*100) : (v25 > 0 ? Infinity : 0);
    return { ...t, v24, v25, yoy };
  });
  const declining = yoyTitulos.filter(t => isFinite(t.yoy) && t.v24 > 0 && t.yoy < -10).sort((a,b) => a.yoy - b.yoy).slice(0, 8);
  const surging = yoyTitulos.filter(t => isFinite(t.yoy) && t.v24 > 0 && t.yoy > 30).sort((a,b) => b.yoy - a.yoy).slice(0, 8);

  // Cobertura: títulos no vendidos por SEHS
  const sehsList = agg.sehsArr.map(s => s.sehs);
  const cobertura = agg.sehsArr.map(s => ({
    sehs: s.sehs,
    cobertura: s.titulosCount,
    pct: (s.titulosCount/catalogSize()*100).toFixed(0),
    faltantes: 24 - s.titulosCount,
  })).sort((a,b) => b.cobertura - a.cobertura);

  // Concentración de cartera: Pareto check
  const sortedT = agg.tituloArr.slice().sort((a,b) => b.value - a.value);
  let cum = 0, total = sortedT.reduce((s, t) => s + t.value, 0);
  let parto80 = 0;
  for (let i = 0; i < sortedT.length; i++) {
    cum += sortedT[i].value;
    if (cum/total >= 0.8) { parto80 = i + 1; break; }
  }

  root.innerHTML = `
    <div class="section-divider"><h2>Hallazgos clave</h2><div class="meta">Análisis automático del corte actual</div></div>

    <div class="s6">
      <div class="insight">
        <b>📊 Concentración de cartera (Pareto):</b> el <b>${parto80} de ${sortedT.length}</b> títulos
        (${(parto80/sortedT.length*100).toFixed(0)}% del catálogo) concentra el <b>80% de ${state.mode==='usd'?'la facturación':'las unidades vendidas'}</b>.
        ${parto80 <= 5 ? 'La cartera es muy concentrada — un riesgo de dependencia de pocos títulos.' : parto80 <= 10 ? 'Concentración saludable con suficiente diversidad.' : 'Cartera bien distribuida.'}
      </div>
    </div>
    <div class="s6">
      <div class="insight">
        <b>🏆 Concentración por SEHS:</b> las top 3 entidades (<b>${top3Sehs.map(s => s.sehs.replace('SEHS ','')).join(', ')}</b>)
        concentran el <b>${top3Share.toFixed(1)}%</b> del total. ${top3Share > 70 ? 'Mercado muy concentrado en pocas SEHS — diversificación geográfica necesaria.' : 'Buena distribución entre SEHS.'}
      </div>
    </div>

    <div class="s6">
      <div class="insight">
        <b>📈 Variación 2025 vs 2024:</b> ${isFinite(agg.yoy) ? `<b style="color:${agg.yoy>=0?'#16A34A':'#EA580C'}">${fmtPct(agg.yoy)}</b>` : 'sin datos comparables'}.
        ${isFinite(agg.yoy) && agg.yoy >= 0 ? 'El crecimiento es positivo — consolidar las palancas que funcionaron.' :
          isFinite(agg.yoy) ? 'Hay caída interanual — revisar causas y reaccionar.' : ''}
        ${!isNaN(agg.cagr) ? ` Tasa compuesta anual (CAGR 2021-2025): <b>${fmtPct(agg.cagr)}</b>.` : ''}
      </div>
    </div>
    <div class="s6">
      <div class="insight">
        <b>🎯 Líder del corte:</b> el título estrella es <b>${escapeHtml(bestT.titulo)}</b> con
        <b>${fmtS(bestT.value)}</b> (${(bestT.value/(state.mode==='usd'?agg.usdSum:agg.qtySum)*100).toFixed(1)}% del total).
        Presente en <b>${bestT.sehsCount}/8</b> SEHS durante <b>${bestT.yearsCount}/5</b> años.
      </div>
    </div>

    <div class="section-divider"><h2>Títulos en crecimiento acelerado</h2><div class="meta">YoY 2025 vs 2024 · &gt; +30%</div></div>
    <section class="panel s6">
      <div class="panel-head"><div><div class="panel-title">📈 Surgiendo</div></div></div>
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr><th>Título</th><th class="num">2024</th><th class="num">2025</th><th class="num">YoY</th></tr></thead>
          <tbody>
            ${surging.length === 0 ? '<tr><td colspan="4" class="empty">No hay títulos con crecimiento &gt; 30%</td></tr>' :
              surging.map(t => `<tr>
                <td class="titulo-cell">${escapeHtml(t.titulo)}</td>
                <td class="num">${fmtS(t.v24)}</td>
                <td class="num"><b>${fmtS(t.v25)}</b></td>
                <td class="num pos">▲ ${fmtPct(t.yoy)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </section>

    <section class="panel s6">
      <div class="panel-head"><div><div class="panel-title">📉 Cayendo</div><div class="panel-subtitle">YoY 2025 vs 2024 · &lt; -10%</div></div></div>
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr><th>Título</th><th class="num">2024</th><th class="num">2025</th><th class="num">YoY</th></tr></thead>
          <tbody>
            ${declining.length === 0 ? '<tr><td colspan="4" class="empty">No hay caídas significativas</td></tr>' :
              declining.map(t => `<tr>
                <td class="titulo-cell">${escapeHtml(t.titulo)}</td>
                <td class="num">${fmtS(t.v24)}</td>
                <td class="num">${fmtS(t.v25)}</td>
                <td class="num neg">▼ ${fmtPct(t.yoy)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </section>

    <div class="section-divider"><h2>Cobertura del catálogo por SEHS</h2><div class="meta">Cuántos de los 24 títulos comercializa cada SEHS</div></div>
    <section class="panel s12">
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr><th>#</th><th>SEHS</th><th class="num">Títulos vendidos</th><th class="num">Cobertura</th><th class="num">Títulos faltantes</th><th class="num">Volumen ${state.mode==='usd'?'USD':'Ejempl.'}</th></tr></thead>
          <tbody>
            ${cobertura.map((c, i) => {
              const s = agg.sehsArr.find(x => x.sehs === c.sehs);
              const val = s ? (state.mode==='usd' ? s.usd : s.qty) : 0;
              return `<tr>
                <td class="mute">${String(i+1).padStart(2,'0')}</td>
                <td class="sehs-cell">${escapeHtml(c.sehs)}</td>
                <td class="num"><b>${c.cobertura}/${catalogSize()}</b></td>
                <td class="num"><b style="color:${c.pct>=70?'#16A34A':c.pct>=40?'#0F766E':'#EA580C'}">${c.pct}%</b></td>
                <td class="num ${c.faltantes>=12?'neg':''}">${c.faltantes}</td>
                <td class="num">${fmtS(val)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </section>

    <div class="section-divider"><h2>Recomendaciones para toma de decisiones</h2><div class="meta">Marketing y comercial</div></div>
    <section class="panel s12" style="background:linear-gradient(135deg, #f0fdfa, #ccfbf1);border-left:4px solid var(--teal-1)">
      <div style="padding:8px 0;font-size:13px;color:#0F172A;line-height:1.7">
        <p style="margin-bottom:10px"><b style="color:#0F766E">1. Expansión del catálogo</b> — Las SEHS con cobertura inferior al 50% (${cobertura.filter(c => c.pct < 50).map(c => c.sehs.replace('SEHS ', '')).join(', ') || 'ninguna'}) son candidatas naturales a recibir más títulos del catálogo.</p>
        <p style="margin-bottom:10px"><b style="color:#0F766E">2. Doblar apuesta en bestsellers</b> — Los top 3 títulos representan el ${top3TitShare.toFixed(1)}% del total. ${top3TitShare > 50 ? 'Demasiada dependencia: equilibrar con campañas en títulos B-tier.' : 'Buena diversidad: capitalizar campañas focales en bestsellers.'}</p>
        <p style="margin-bottom:10px"><b style="color:#0F766E">3. Reactivar títulos en caída</b> — ${declining.length} títulos con caída superior al 10%. Revisar precios, stock, posicionamiento o canales de promoción.</p>
        <p style="margin-bottom:0"><b style="color:#0F766E">4. Apalancar títulos emergentes</b> — ${surging.length} títulos en crecimiento acelerado (+30% YoY). Asegurar stock e impulsar lanzamiento en SEHS donde aún no se venden.</p>
      </div>
    </section>
  `;
}

// ============ INIT ============
function bootApp() {
  // Si es usuario SEHS, fijar su SEHS
  if (session.role === 'sehs') {
    state.sehs = session.sehs;
  } else {
    state.sehs = 'all';
  }
  render();
  // Agregar footer una vez
  if (!document.getElementById('app-footer')) {
    const footer = document.createElement('div');
    footer.id = 'app-footer';
    footer.style.cssText = 'padding:20px 28px;border-top:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--gray-txt);display:flex;justify-content:space-between;background:var(--card)';
    footer.innerHTML = `
      <div>Plataforma ACES-DSA · Sesión: ${escapeHtml(session.displayName)} · ${RAW.length.toLocaleString()} registros · ${new Set(RAW.map(r=>r.Factura)).size} facturas</div>
      <div>Estilo gráfico 07 Data-Dense · v2.0 · Compilado ${new Date().toLocaleDateString('es-AR')}</div>
    `;
    document.body.appendChild(footer);
  }
}

// Resize debounced
let rt;
window.addEventListener('resize', () => {
  clearTimeout(rt);
  rt = setTimeout(() => { if (session) render(); }, 200);
});

// Flujo de arranque
if (restoreSession()) {
  bootApp();
} else {
  showLogin();
}
</script>
